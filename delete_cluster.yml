name: Delete Cluster

on:
  workflow_dispatch:
    inputs:
      workspace_url:
        description: 'Workspace URL (e.g., https://workspace.azure.com)'
        required: true
        type: string
      cluster_url:
        description: 'Cluster URL (e.g., https://cluster.azure.com)'
        required: true
        type: string
      cluster_name:
        description: 'Cluster name to delete'
        required: true
        type: string

env:
  # Azure Authentication - Reference secrets and variables
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  WORKSPACE_URL: ${{ github.event.inputs.workspace_url }}
  CLUSTER_URL: ${{ github.event.inputs.cluster_url }}
  CLUSTER_NAME: ${{ github.event.inputs.cluster_name }}

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Print workflow inputs (debug)
        run: |
          echo "🔍 Workflow Inputs:"
          echo "  Workspace URL: ${{ github.event.inputs.workspace_url }}"
          echo "  Cluster URL: ${{ github.event.inputs.cluster_url }}"
          echo "  Cluster name: ${{ github.event.inputs.cluster_name }}"
          echo ""
          echo "🔐 Azure Authentication Status:"
          if [ -n "${AZURE_CLIENT_ID}" ]; then echo "  ✓ Azure credentials are set"; else echo "  ✗ Azure credentials are NOT set"; fi

      - name: Azure CLI login
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          set -e
          echo "🔐 Authenticating with Azure..."
          az login --service-principal \
            -u "${AZURE_CLIENT_ID}" \
            -p "${AZURE_CLIENT_SECRET}" \
            --tenant "${AZURE_TENANT_ID}"
          az account set --subscription "${AZURE_SUBSCRIPTION_ID}"
          echo "✓ Azure authentication successful"

      - name: Delete cluster
        env:
          WORKSPACE_URL: ${{ github.event.inputs.workspace_url }}
          CLUSTER_URL: ${{ github.event.inputs.cluster_url }}
          CLUSTER_NAME: ${{ github.event.inputs.cluster_name }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          echo "🗑 Starting cluster deletion process..."
          python delete_cluster.py "${{ github.event.inputs.cluster_name }}" \
            "${{ github.event.inputs.workspace_url }}" \
            "${{ secrets.DATABRICKS_TOKEN }}"

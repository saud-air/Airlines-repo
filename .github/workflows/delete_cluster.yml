name: Delete Cluster

on:
  workflow_dispatch:
    inputs:
      workspace_id:
        description: 'Workspace ID'
        required: true
        type: string
      cluster_id:
        description: 'Cluster ID'
        required: true
        type: string
      cluster_name:
        description: 'Cluster name to delete'
        required: true
        type: string
      subscription_id:
        description: 'Azure Subscription ID'
        required: true
        type: string

env:
  WORKSPACE_ID: ${{ github.event.inputs.workspace_id }}
  CLUSTER_ID: ${{ github.event.inputs.cluster_id }}
  CLUSTER_NAME: ${{ github.event.inputs.cluster_name }}
  SUBSCRIPTION_ID: ${{ github.event.inputs.subscription_id }}

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Verify configuration
        run: |
          echo "🔍 Workflow Configuration:"
          echo "  Workspace ID: ${{ github.event.inputs.workspace_id }}"
          echo "  Cluster ID: ${{ github.event.inputs.cluster_id }}"
          echo "  Cluster name: ${{ github.event.inputs.cluster_name }}"
          echo "  Subscription ID: ${{ github.event.inputs.subscription_id }}"
          echo ""
          echo "🔐 Authentication Method: Databricks Token"
          echo "ℹ Using Databricks API for cluster deletion"

      - name: Delete cluster
        env:
          WORKSPACE_ID: ${{ github.event.inputs.workspace_id }}
          CLUSTER_ID: ${{ github.event.inputs.cluster_id }}
          CLUSTER_NAME: ${{ github.event.inputs.cluster_name }}
          SUBSCRIPTION_ID: ${{ github.event.inputs.subscription_id }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          WORKSPACE_URL: ${{ secrets.WORKSPACE_URL }}
        run: |
          echo "🗑 Starting cluster deletion process..."
          echo "  Workspace ID: ${WORKSPACE_ID}"
          echo "  Cluster ID: ${CLUSTER_ID}"
          echo "  Cluster Name: ${CLUSTER_NAME}"
          echo "  Subscription ID: ${SUBSCRIPTION_ID}"
          python delete_cluster.py "${CLUSTER_NAME}" "${WORKSPACE_URL}" "${DATABRICKS_TOKEN}" "${WORKSPACE_ID}" "${CLUSTER_ID}" "${SUBSCRIPTION_ID}"

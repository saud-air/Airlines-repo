name: Delete Cluster
on:
  workflow_dispatch:
    inputs:
      cluster_name:
        description: 'Name of the cluster to delete'
        required: true
        type: string

jobs:
  delete-cluster:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run delete script
        run: python delete_cluster.py "${{ github.event.inputs.cluster_name }}"
